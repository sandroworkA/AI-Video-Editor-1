<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleSync AI - Modular</title>
    <link rel="stylesheet" href="css/main.css">
    <!-- FFmpeg loaded globally since it's a special WASM library -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/umd/ffmpeg.js"></script>
    <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <div class="logo">StyleSync AI</div>
            <div class="status">
                <span class="indicator ready"></span>
                <span>System Ready</span>
            </div>
        </nav>

        <main id="main-container">
            <!-- UI injected here by UIManager -->
            <div id="upload-zone" class="active">
                <div class="drop-area">
                    <input type="file" id="file-input" accept="video/*" hidden>
                    <h1>Drop video here</h1>
                    <p>AI will analyze, cut silence, add zooms, enhance audio</p>
                </div>
            </div>

            <div id="analysis-panel" class="hidden">
                <div class="progress-container">
                    <div class="progress-bar" id="analysis-bar"></div>
                    <span id="analysis-text">Initializing AI...</span>
                </div>
            </div>

            <div id="editor-panel" class="hidden">
                <div class="workspace">
                    <div class="preview-section">
                        <video id="preview-video" controls></video>
                        <div id="timeline-container"></div>
                    </div>
                    <div class="controls-section" id="controls">
                        <!-- Controls injected by UIManager -->
                    </div>
                </div>
            </div>

            <div id="export-panel" class="hidden">
                <div class="export-status">
                    <div class="spinner" id="export-spinner"></div>
                    <h2 id="export-status-text">Processing...</h2>
                    <div class="progress-bar" id="export-bar"></div>
                    <a id="download-link" class="hidden btn-primary" download>
                        Download Video
                    </a>
                </div>
            </div>
        </main>
    </div>

    <!-- Entry point as module -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
